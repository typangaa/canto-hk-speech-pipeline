# Storage layout SSOT — all data paths resolve from here.
# Downstream code should import config/storage_layout.py (wrapper) rather than
# hardcoding paths. Symlinks in data/ are legacy; new code reads this file.
#
# Drive map (post §3 Phase A+B, 2026-07-02 — see docs/PIPELINE_REARCHITECTURE_PLAN.md §3 執行結果):
#   nvme0n1  ext4  /             hot: repo, metadata, nvme cache (+ canto-tts training, temp-parked)
#   sdb1     ext4  /mnt/Drive2   warm: raw corpus (transient — delete after segment)
#   sdd1     ext4  /mnt/Drive4   warm: filtered + segments (working corpus)
#   sda1     NTFS  /mnt/Drive1   cold: personal archive (Windows share)
#   sdc1     ext4  /mnt/Drive3   warm: segments shard 1 (P5-C, 2026-07-06)
#
# Raw policy: TRANSIENT — delete raw source after segment+label pass is complete.
# Never publish raw audio / source URLs / reconstruction recipe (zero-risk policy).

storage:
  # ── Hot tier: NVMe (OS drive, ext4) ──────────────────────────────────────
  nvme_root: /

  # Repo + working metadata stay on nvme (fast random read for training dataloaders)
  repo: /home/typangaa/Documents/canto-hk-speech-pipeline
  metadata: /home/typangaa/Documents/canto-hk-speech-pipeline/metadata

  # NVMe decode cache: decode-once fan-out stores resampled variants here (LRU)
  nvme_cache: /home/typangaa/Documents/canto-hk-speech-pipeline/.cache/decoded

  # ── Warm tier: Drive2 ext4 (sdb1, 1.9T) — raw corpus ────────────────────
  drive2: /mnt/Drive2

  # Raw audio (transient — exists only until segmented; delete after Stage 3)
  raw_root: /mnt/Drive2/canto-corpus/data/raw
  raw_youtube: /mnt/Drive2/canto-corpus/data/raw/youtube
  raw_rthk: /mnt/Drive2/canto-corpus/data/raw/rthk
  raw_podcast: /mnt/Drive2/canto-corpus/data/raw/podcast

  # ── Warm tier: Drive4 ext4 (sdd1, 1.8T) — working corpus ────────────────
  drive4: /mnt/Drive4

  # Filtered audio (post Stage 5 DNSMOS gate)
  filtered_root: /mnt/Drive4/canto/filtered

  # Segments (Stage 3 output — the primary training-ready wavs)
  # data/segments/ is a dir with per-source symlinks → Drive4 (all sources post Phase-A S6)
  segments_root: /mnt/Drive4/canto/segments
  segments_youtube: /mnt/Drive4/canto/segments/youtube
  segments_podcast: /mnt/Drive4/canto/segments/podcast
  segments_rthk: /mnt/Drive4/canto/segments/rthk

  # Label store (Stage 11+ unified labels; id-keyed; written by build_label_store.py)
  labels_store: /mnt/Drive4/canto/labels

  # ── Cold tier: Drive1 NTFS (sda1, 1.9T) — personal archive ──────────────
  drive1: /mnt/Drive1
  personal_archive: /mnt/Drive1/Personal

  # ── Warm tier: Drive3 ext4 (sdc1, 1.8T) — segments shard 1 (P5-C, 2026-07-06) ──
  drive3: /mnt/Drive3

# Cross-disk sharding for the `segments` table (P5-C, 2026-07-06 — see
# docs/REARCHITECTURE_IMPLEMENTATION_PLAN.md §8 P5-C). Shard key is
# hash(coalesce(raw_id, id)) % n_shards (config/storage_layout.py: shard_index /
# shard_root) — raw_id when the segment was cut by this pipeline, falling back to
# the segment's own id for the 455,299 P0 legacy-imported rows that never got a
# raw_id link. pipeline/nodes/segment.py's segment.vad_cut consults this for
# every NEW segment write; pipeline/nodes/rebalance.py does the one-time
# migration of pre-existing segments onto this layout.
sharding:
  enabled: true
  n_shards: 3
  shard_roots:
    - /mnt/Drive2/canto/segments   # shard 0 — space freed by P5-B raw WAV->FLAC transcode
    - /mnt/Drive3/canto/segments   # shard 1 — was empty, now in use
    - /mnt/Drive4/canto/segments   # shard 2 — pre-P5-C home of all 466,710 segments

# Decoder cache config (decode-once fan-out)
decode_cache:
  root: /home/typangaa/Documents/canto-hk-speech-pipeline/.cache/decoded
  max_gb: 200          # LRU eviction threshold (nvme has 594G free; leave headroom)
  sample_rates: [16000, 32000, 48000]   # variants pre-computed per clip
