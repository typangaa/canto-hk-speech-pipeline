# HK Cantonese Audiobook / Storytelling Sources (有聲書 / 講故仔)
# YouTube channels featuring single-narrator long-form Cantonese monologue —
# fiction audiobooks, non-fiction book summaries, children's story reading.
#
# Why this source matters: single studio/home-mic narrator, minimal background
# noise, long uninterrupted single-speaker turns — high acoustic cleanliness
# and low diarization/VAD complexity relative to multi-speaker talk shows.
# Valuable for TTS training data quality even though speaker diversity per
# channel is low (one narrator per channel, sometimes for hundreds of hours).
#
# Usage: python -m pipeline.cli run ingest.download -- --source audiobook
# Schema: see docs/SOURCE_GUIDE.md
# Status values: active | paused | done | skip | evaluate
#   evaluate = seeded from online research, not yet spot-checked via yt-dlp
#   or listened to — do not download in bulk until promoted to "active".
#
# Seeded 2026-07-20 from agy-gemini online research. Every entry below is
# UNVERIFIED: channel handles, hour estimates, and content descriptions have
# not been confirmed against the live channel. Before promoting any entry to
# status: active, run `yt-dlp --simulate --dump-json` against the channel URL
# and listen to 2-3 episodes per docs/SOURCE_GUIDE.md.

