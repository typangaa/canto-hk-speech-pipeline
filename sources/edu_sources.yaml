# HK University Public Lecture / Open Courseware Sources
# Long-form (45-90min) single-speaker Cantonese-medium academic lectures.
# Clean podium/lapel-mic audio, maps directly onto the "educational" domain —
# currently under-represented in the corpus (helps domain diversity for the
# acceptance criteria).
#
# Usage: python scripts/02_download.py --source edu
# This file is read by 01_discover.py and 02_download.py.
#
# Schema: see docs/SOURCE_GUIDE.md
# Status values: active | paused | done | skip | evaluate
#
# SEEDING NOTE (2026-07-20): every entry in this file was sourced from
# agy-gemini online research and is UNVERIFIED — status is "evaluate" for
# all entries until spot-checked. Do not download at scale before running
# yt-dlp --simulate --dump-json + a 2-3 episode listen test per
# docs/SOURCE_GUIDE.md and promoting the entry to status: active.
#
# ⚠️ ENGLISH/CANTONESE-MEDIUM MIXING CAVEAT: many HK university channels mix
# English-medium and Cantonese-medium content on the same channel (different
# faculties, different lecturers, different series). Verify each specific
# playlist/handle is genuinely Cantonese-medium — do not trust a whole
# channel just because one lecture series on it is in Cantonese. Some
# channels may need per-playlist rather than per-channel scoping once
# verified.

# ──────────────────────────────────────────────
# High Priority — University Public Lecture Channels
# ──────────────────────────────────────────────

