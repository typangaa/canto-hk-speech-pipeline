# HK Cantonese Radio Drama (廣播劇) Audio Sources
# New source category: "drama" — voice-acted narrative audio, multi-speaker
#
# Usage: python -m pipeline.cli run ingest.download -- --source drama
# Schema: see docs/SOURCE_GUIDE.md
# Status values: active | paused | done | skip | evaluate
#
# Seeded from agy-gemini online research (2026-07-20). Every entry below is
# UNVERIFIED — not yet spot-checked via yt-dlp or listened to. All entries
# carry status: "evaluate" until a human/spot-check promotes them.
#
# ⚠️ CAUTION — higher filter-yield risk than other sources:
# Unlike other categories, radio drama audio commonly mixes background music
# (BGM) and sound effects (SFX) under the dialogue throughout the recording.
# docs/SOURCE_GUIDE.md already flags "Audio has background music throughout"
# as a quality red flag that can suppress DNSMOS below the pipeline's 3.0
# pass threshold for most segments. Treat every channel in this file as
# higher-risk than a typical talk/news/podcast source:
#   1. Before ANY bulk download, run yt-dlp --limit (a handful of episodes)
#      and a mini segment.diarize → segment.vad_cut → asr.transcribe →
#      filter.* pass on that small batch.
#   2. Check the resulting filter.decide pass rate. SOURCE_GUIDE.md flags
#      <40% pass rate as needing investigation before committing to a
#      bulk download of that channel.
#   3. Only promote status to "active" after this spot-check confirms an
#      acceptable pass rate.
#
# Out of scope for this file (researched but not included):
#   - HKU Digital Repository historical Commercial Radio drama tapes
#     (1966-1976): an academic archive, not a yt-dlp/RSS-downloadable web
#     source — not compatible with this pipeline's ingest.download mechanism.
#     Possible future manual-research item if a downloadable mirror surfaces.
#   - RTHK Podcast One radio drama: already covered by sources/rthk_sources.yaml
#     and sources/podcast_sources.yaml — not duplicated here.

# ──────────────────────────────────────────────
# Candidates — pending spot-check verification
