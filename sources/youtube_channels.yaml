# ──────────────────────────────────────────────
# Download Configuration
# ──────────────────────────────────────────────
#
# Applied to all channels in this file by 02_download.py:

download_config:
  format: "bestaudio/best"
  audio_format: "wav"
  audio_quality: 0
  postprocessor_args: "ffmpeg:-ar 48000 -ac 1"  # 48 kHz mono master — NEVER lower (KNOWN_ISSUES §11)
  restrict_filenames: true
  sleep_interval: 3        # seconds between downloads — be polite
  max_sleep_interval: 8
  retries: 5
  fragment_retries: 5
  max_filesize: "500M"     # skip files > 500 MB (likely music videos or streams)
  match_filter: "duration > 120 & duration < 14400"  # 2 min to 4 hours
  # Exclude: music videos, shorts (< 2 min), streams (> 4 hours)
