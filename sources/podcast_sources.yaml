# ──────────────────────────────────────────────
# Download Configuration
# ──────────────────────────────────────────────

# Applied by `pipe run ingest.download` (pipeline/nodes/ingest_download.py).
# Policy (2026-07-04, DECISIONS.md "Storage format policy FINALIZED"): podcast RSS
# enclosures (typically MP3) are saved AS-IS, no ffmpeg conversion — re-encoding an
# already-lossy source is not acceptable archival practice. Legacy scripts/02_download.py
# (force-converts to WAV) is kept only as historical reference.
download_config:
  max_age_days: 365           # skip episodes older than 1 year
  sleep_between_episodes: 2   # seconds between downloads

# ──────────────────────────────────────────────
# How to Find New Podcast RSS URLs
# ──────────────────────────────────────────────
#
# Option 1: Apple Podcasts Lookup API
#   1. Find the podcast on https://podcasts.apple.com — note the id in the URL
#   2. curl "https://itunes.apple.com/lookup?id=XXXXXXXXX&entity=podcast"
#   3. Extract the feedUrl field from the JSON
#
# Option 2: Directly from podcast website
#   Most podcasts link their RSS feed in the footer or "Subscribe" section.
#
# Option 3: Podchaser / Listen Notes
#   Search these directories for HK Cantonese podcasts with RSS feeds.
