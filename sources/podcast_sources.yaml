# HK Cantonese Podcast Sources
#
# Usage: python scripts/02_download.py --source podcast
# This file is read by 01_discover.py and 02_download.py.
#
# Podcasts are downloaded via RSS. Verify RSS URL before running:
#   curl -s "{rss_url}" | python3 -c "import sys,feedparser; f=feedparser.parse(sys.stdin.read()); print('Title:', f.feed.title); print('Episodes:', len(f.entries))"
#
# See docs/SOURCE_GUIDE.md for evaluation criteria.
# Status values: active | evaluate | paused | skip

